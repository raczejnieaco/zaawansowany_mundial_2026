<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Centrum Wyników</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a365d; margin-bottom: 25px; }
        
        /* Nawigacja */
        .menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; flex-wrap: wrap; }
        .menu-btn { background: #edf2f7; color: #4a5568; border: none; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .menu-btn.active { background: #0066cc; color: white; }
        .menu-btn:hover { background: #cbd5e0; }

        .section { display: none; }
        .section.active { display: block; }

        /* Tabele */
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #1a365d; color: white; font-size: 13px; text-transform: uppercase; }
        
        .flag { width: 24px; height: 16px; border: 1px solid #ddd; border-radius: 2px; vertical-align: middle; margin-right: 8px; }
        .score { font-weight: bold; background: #edf2f7; padding: 4px 8px; border-radius: 4px; letter-spacing: 2px; }
        
        /* Styl Tabeli Ligowej (Grupy) */
        .stats-table th { background-color: #2d3748; text-align: center; }
        .stats-table td { text-align: center; }
        .stats-table td.team-name { text-align: left; font-weight: bold; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .group-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; }
        .group-title { font-size: 18px; color: #1a365d; margin-top: 0; border-bottom: 2px solid #0066cc; padding-bottom: 5px; }

        /* Faza Pucharowa */
        .bracket { display: flex; justify-content: space-between; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; font-style: italic; color: #718096; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Monitor Mistrzostw Świata 2026</h1>

    <div class="menu">
        <button class="menu-btn active" onclick="switchSec('chron', this)">📅 Harmonogram i Wyniki</button>
        <button class="menu-btn" onclick="switchSec('tables', this)">📊 Tabele Grupowe (Live)</button>
        <button class="menu-btn" onclick="switchSec('groups-matches', this)">🗂️ Mecze w Grupach</button>
        <button class="menu-btn" onclick="switchSec('knockout', this)">🔥 Faza Pucharowa</button>
    </div>

    <div id="chron" class="section active">
        <h2>Mecz po meczu</h2>
        <table id="matches-timeline">
            <thead>
                <tr>
                    <th>Data (PL)</th>
                    <th>Gospodarz</th>
                    <th style="text-align:center;">Wynik</th>
                    <th>Gość</th>
                    <th>Grupa</th>
                </tr>
            </thead>
            <tbody id="timeline-body">
                </tbody>
        </table>
    </div>

    <div id="tables" class="section">
        <h2>Aktualna klasyfikacja punktowa</h2>
        <div class="grid-layout" id="groups-tables-container">
            </div>
    </div>

    <div id="groups-matches" class="section">
        <h2>Terminarz grupowy</h2>
        <div class="grid-layout" id="groups-matches-container">
            </div>
    </div>

    <div id="knockout" class="section">
        <h2>Drzewko Fazy Pucharowej</h2>
        <div class="bracket">
            <p>Drzewko pucharowe (od 1/16 finału) wygeneruje się automatycznie po zakończeniu fazy grupowej (27-30 czerwca 2026 r.).</p>
        </div>
    </div>
</div>

<script>
    // 1. Baza danych meczów (Harmonogram stały)
    const initialMatches = [
        { id: 1, date: "11.06, 21:00", home: "Meksyk", homeCode: "mx", away: "RPA", awayCode: "za", group: "A", homeScore: null, awayScore: null },
        { id: 2, date: "12.06, 04:00", home: "Korea Płd.", homeCode: "kr", away: "Czechy", awayCode: "cz", group: "A", homeScore: null, awayScore: null },
        { id: 3, date: "12.06, 21:00", home: "Kanada", homeCode: "ca", away: "Bośnia i Herc.", awayCode: "ba", group: "B", homeScore: null, awayScore: null },
        { id: 4, date: "13.06, 03:00", home: "USA", homeCode: "us", away: "Paragwaj", awayCode: "py", group: "D", homeScore: null, awayScore: null },
        { id: 5, date: "13.06, 21:00", home: "Katar", homeCode: "qa", away: "Szwajcaria", awayCode: "ch", group: "B", homeScore: null, awayScore: null },
        { id: 6, date: "14.06, 00:00", home: "Brazylia", homeCode: "br", away: "Maroko", awayCode: "ma", group: "C", homeScore: null, awayScore: null }
        // Tutaj dopisują się kolejne mecze...
    ];

    // 2. Funkcja pobierająca aktualne wyniki raz dziennie / przy odświeżeniu
    async function fetchLiveResults() {
        try {
            // W prawdziwym środowisku podmieniasz ten URL na adres darmowego API, np:
            // const response = await fetch('https://api.worldcup.com/v1/matches');
            // const liveData = await response.json();
            
            // Symulacja pobranych danych (zamiast API, na potrzeby testu):
            const mockLiveData = {
                1: { homeScore: 2, awayScore: 1 }, // Meksyk wygrał 2:1
                2: { homeScore: 0, awayScore: 0 }  // Remis 0:0
            };

            // Naniesienie wyników na nasz harmonogram
            initialMatches.forEach(match => {
                if(mockLiveData[match.id]) {
                    match.homeScore = mockLiveData[match.id].homeScore;
                    match.awayScore = mockLiveData[match.id].awayScore;
                }
            });
        } catch (error) {
            console.error("Błąd pobierania wyników z zewnętrznego źródła:", error);
        }
        
        // Po pobraniu danych – zbuduj stronę na nowo
        renderTimeline();
        calculateTables();
    }

    // 3. Renderowanie widoku chronologicznego
    function renderTimeline() {
        const tbody = document.getElementById('timeline-body');
        tbody.innerHTML = '';
        initialMatches.forEach(m => {
            const scoreDisplay = (m.homeScore !== null) ? `${m.homeScore} : ${m.awayScore}` : "vs";
            tbody.innerHTML += `
                <tr>
                    <td><strong>${m.date}</strong></td>
                    <td><img src="flagi/${m.homeCode}.png" class="flag"> ${m.home}</td>
                    <td style="text-align:center;"><span class="score">${scoreDisplay}</span></td>
                    <td><img src="flagi/${m.awayCode}.png" class="flag"> ${m.away}</td>
                    <td>Grupa ${m.group}</td>
                </tr>
            `;
        });
    }

    // 4. Automatyczne obliczanie tabel grupowych na podstawie wyników meczów
    function calculateTables() {
        const groups = {};
        
        // Inicjalizacja struktur grup
        initialMatches.forEach(m => {
            if (!groups[m.group]) groups[m.group] = {};
            if (!groups[m.group][m.home]) groups[m.group][m.home] = { name: m.home, code: m.homeCode, m: 0, pkt: 0, gZ: 0, gS: 0 };
            if (!groups[m.group][m.away]) groups[m.group][m.away] = { name: m.away, code: m.awayCode, m: 0, pkt: 0, gZ: 0, gS: 0 };
            
            // Przeliczanie statystyk, jeśli mecz się odbył
            if (m.homeScore !== null && m.awayScore !== null) {
                const h = groups[m.group][m.home];
                const a = groups[m.group][m.away];
                h.m++; a.m++;
                h.gZ += m.homeScore; h.gS += m.awayScore;
                a.gZ += m.awayScore; a.gS += m.homeScore;
                
                if (m.homeScore > m.awayScore) { h.pkt += 3; }
                else if (m.homeScore < m.awayScore) { a.pkt += 3; }
                else { h.pkt += 1; a.pkt += 1; }
            }
        });

        // Generowanie kodu HTML dla tabel
        const container = document.getElementById('groups-tables-container');
        container.innerHTML = '';

        for (const [groupName, teams] of Object.entries(groups)) {
            // Sortowanie drużyn po punktach i bilansie bramkowym
            const sortedTeams = Object.values(teams).sort((x, y) => y.pkt - x.pkt || (y.gZ - y.gS) - (x.gZ - x.gS));
            
            let tableHtml = `
                <div class="group-card">
                    <h3 class="group-title">Grupa ${groupName}</h3>
                    <table class="stats-table">
                        <thead><tr><th style="text-align:left;">Kraj</th><th>M</th><th>Bilans</th><th>Pkt</th></tr></thead>
                        <tbody>
            `;
            
            sortedTeams.forEach(t => {
                tableHtml += `
                    <tr>
                        <td class="team-name"><img src="flagi/${t.code}.png" class="flag">${t.name}</td>
                        <td>${t.m}</td>
                        <td>${t.gZ}:${t.gS}</td>
                        <td><strong>${t.pkt}</strong></td>
                    </tr>
                `;
            });
            
            tableHtml += `</tbody></table></div>`;
            container.innerHTML += tableHtml;
        }
    }

    // Nawigacja zakładkami
    function switchSec(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Uruchomienie skryptu przy starcie
    window.onload = fetchLiveResults;
</script>

</body>
</html>
